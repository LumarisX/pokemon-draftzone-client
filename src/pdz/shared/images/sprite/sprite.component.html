<div
  class="forme-stack"
  [class.interactive]="interactive() && stateCount() > 1"
  [style.width]="size()"
  [style.height]="size()"
  (contextmenu)="onContextMenu($event)"
>
  @for (slot of slots(); track slot.pokemon.id) {
    <div
      class="forme-slot"
      [class.active]="slot.isActive"
      [class.silhouette]="!slot.isActive"
      [style.transform]="slot.transform"
      [style.zIndex]="slot.zIndex"
      [title]="slot.isActive ? '' : slot.pokemon.name"
      (click)="onSlotClick(slot)"
    >
      <pdz-sprite-image
        [pokemon]="slot.pokemon"
        size="100%"
        [flipped]="flipped()"
        [disabled]="disabled()"
        [tooltipPosition]="slot.isActive ? tooltipPosition() : null"
        (loadedEvent)="onSlotLoaded(slot)"
      ></pdz-sprite-image>
    </div>
  }
</div>
