@if (typechart) {
  <table>
    <thead>
      <tr>
        <th></th>
        @for (type of types; track $index) {
          <th
            class="action-cell"
            (click)="setSort(type)"
            (mouseenter)="columnHovered.next(type)"
            (mouseleave)="columnHovered.next(null)"
            [class.column-hovered]="type === columnHovered.value"
          >
            <div class="pdz-types" [class.sort-press]="sortedBy.value === type">
              <div class="pdz-type" [style.backgroundColor]="typeColor(type)">
                <div class="pdz-type__icon-wrapper">
                  <img
                    class="pdz-type__icon"
                    [src]="
                      '../../../assets/icons/types/gen9icon/' + type + '.png'
                    "
                    onerror="
                      this.src = '../../../assets/icons/types/Unknown.png'
                    "
                    [alt]="type"
                  />
                </div>
                <span class="pdz-type__text">{{ type }}</span>
              </div>
            </div>
          </th>
        }
      </tr>
    </thead>
    <tbody>
      @for (pokemon of sortedTeam | async; track $index) {
        <tr [class.disabled]="pokemon.disabled">
          <td class="action-cell">
            <div class="sprite-wrapper">
              <pdz-sprite
                size="3rem"
                tooltipPosition="left"
                flipped
                cycleDisabled
                [pokemon]="pokemon"
                [disabled]="pokemon.disabled ?? false"
                (disabledChange)="pokemon.disabled = $event"
                [formeIndex]="pokemon.formeIndex ?? 0"
                (formeIndexChange)="pokemon.formeIndex = $event"
                (cycled)="togglePokemon.emit(pokemon)"
              ></pdz-sprite>
            </div>
          </td>
          @for (type of types; track $index) {
            <td
              class="type-cell"
              (mouseenter)="columnHovered.next(type)"
              (mouseleave)="columnHovered.next(null)"
              [ngClass]="{ 'column-hovered': type === columnHovered.value }"
            >
              <div
                class="type-wrapper"
                [ngClass]="
                  weaknessColor(activeWeak(pokemon)[type], pokemon.disabled!)
                "
              >
                @if (activeWeak(pokemon)[type] !== 1) {
                  {{ activeWeak(pokemon)[type] }}
                }
              </div>
            </td>
          }
        </tr>
      }
    </tbody>
  </table>
}
