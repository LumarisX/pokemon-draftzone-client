@let user = auth.user$ | async;
@if (authenticated && user) {
  <button class="login-btn" [matMenuTriggerFor]="userMenu">
    <div class="user-info-container">
      <img class="user-icon" src="{{ user.picture }}" />
      @if (user.username && user.username !== "") {
        <span class="username-text">{{ user.username }}</span>
      }
    </div>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="settingsDialog.openDialog()">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Log Out</span>
    </button>
  </mat-menu>
} @else {
  <button class="login-btn" (click)="login()">
    <span>Log in</span> <mat-icon>login</mat-icon>
  </button>
}

<pdz-settings-dialog #settingsDialog></pdz-settings-dialog>
