<div
  class="filter-drawer"
  role="dialog"
  [attr.aria-label]="
    isEditing
      ? 'Edit ' + currentFieldDef.label + ' filter'
      : 'Add ' + currentFieldDef.label + ' filter'
  "
>
  <div class="filter-drawer__header">
    <div class="filter-drawer__field-info">
      <span class="filter-drawer__field-name">{{ currentFieldDef.label }}</span>
      @if (isEditing) {
        <pdz-icon
          class="filter-drawer__edit-badge"
          name="edit"
          size="sm"
        ></pdz-icon>
      }
    </div>
    <div class="filter-drawer__header-actions">
      <button
        type="button"
        class="filter-drawer__apply-btn"
        [disabled]="!isApplyEnabled"
        (click)="applyFilter()"
        aria-label="Apply filter"
      >
        <pdz-icon name="check"></pdz-icon>
      </button>
      <button
        type="button"
        class="filter-drawer__close"
        (click)="cancelFilter()"
        aria-label="Close filter drawer"
      >
        <pdz-icon name="close"></pdz-icon>
      </button>
    </div>
  </div>

  <div class="filter-drawer__body">
    <div class="filter-drawer__filter-row">
      <div class="filter-drawer__chips" role="group" aria-label="Operator">
        @for (op of currentFieldDef.operators; track op) {
          <button
            type="button"
            class="filter-drawer__chip"
            [class.is-active]="draft.operator === op"
            (click)="setOperator(op)"
          >
            {{ operatorMap[op].label }}
          </button>
        }
      </div>

      @if (currentFieldDef.type === "boolean") {
        <div class="filter-drawer__chips" role="group" aria-label="Value">
          <button
            type="button"
            class="filter-drawer__chip filter-drawer__chip--wide"
            [class.is-active]="draft.value === true"
            (click)="draft.value = true"
          >
            Yes
          </button>
          <button
            type="button"
            class="filter-drawer__chip filter-drawer__chip--wide"
            [class.is-active]="draft.value === false"
            (click)="draft.value = false"
          >
            No
          </button>
        </div>
      } @else if (currentFieldDef.type === "number") {
        <input
          id="drawer-value"
          type="number"
          class="filter-drawer__value-input"
          [(ngModel)]="draft.value"
          (keydown.enter)="applyFilter()"
        />
      } @else if (isTypeField) {
        <div
          class="filter-drawer__type-grid"
          role="group"
          aria-label="Select a type"
        >
          @for (type of allTypes; track type) {
            <button
              type="button"
              class="filter-drawer__type-btn"
              [class.is-selected]="draft.value === type"
              (click)="draft.value = type"
              [attr.aria-label]="type"
              [attr.aria-pressed]="draft.value === type"
            >
              <pdz-pokemon-type
                [type]="type"
                [disabled]="draft.value !== type"
                display="both"
                direction="column"
              ></pdz-pokemon-type>
            </button>
          }
        </div>
      } @else {
        <input
          id="drawer-value"
          type="text"
          class="filter-drawer__value-input"
          [(ngModel)]="draft.value"
          (keydown.enter)="applyFilter()"
          autocomplete="off"
        />
      }
    </div>
  </div>
</div>
