<h1 mat-dialog-title>Edit Team Info</h1>
<form [formGroup]="form" (ngSubmit)="onSave()">
  <div mat-dialog-content class="dialog-body">
    <div class="form-field">
      <label for="team-name" class="form-field__label">
        Team Name <span class="required">*</span>
      </label>
      <input
        id="team-name"
        type="text"
        class="form-field__input"
        placeholder="The Double Helixes"
        formControlName="teamName"
      />
      @if (
        form.get("teamName")?.hasError("required") &&
        form.get("teamName")?.touched
      ) {
        <span class="form-field__error">Required</span>
      }
    </div>

    <div class="form-field">
      <label class="form-field__label">Team Logo</label>
      <div class="logo-edit">
        <img class="logo-edit__preview" [src]="previewUrl" alt="Team logo" />
        <div class="logo-edit__controls">
          <input
            #logoInput
            type="file"
            class="file-input-hidden"
            accept="image/*"
            (change)="onLogoChange($event)"
          />
          <button
            type="button"
            class="form-field__input file-input-button"
            (click)="logoInput.click()"
          >
            {{ logoFileName || "Choose File" }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div mat-dialog-actions align="end">
    <button type="button" class="btn btn--secondary" (click)="closeDialog()">
      Cancel
    </button>
    <button type="submit" class="btn btn--primary" [disabled]="form.invalid">
      Save Changes
    </button>
  </div>
</form>
