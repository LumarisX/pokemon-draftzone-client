<div class="widget-container" [class.alternate]="opponent">
  <div class="widget-header">
    <div class="widget-label">Draft Summary</div>
    <pdz-swap-opponent [(ngModel)]="opponent"></pdz-swap-opponent>
  </div>
  <div class="widget-body">
    <pdz-summary-core
      [summary]="opponent ? summaries[1] : summaries[0]"
    ></pdz-summary-core>
  </div>
</div>
