<div class="widget-container" [class.alternate]="opponent">
  <div class="widget-header">
    <div class="widget-label">Coverage</div>
    <div class="widget-options">
      <mat-slide-toggle [(ngModel)]="abilities" labelPosition="before"
        >Abilities</mat-slide-toggle
      >
      <pdz-swap-opponent [(ngModel)]="opponent"></pdz-swap-opponent>
    </div>
  </div>
  <div class="widget-body">
    @for (pokemon of coverage[selectedTeam]; track pokemon) {
      <pdz-coverage
        [pokemon]="pokemon"
        [typechart]="typecharts[(selectedTeam + 1) % typecharts.length]"
        [abilities]="abilities"
      ></pdz-coverage>
    }
  </div>
</div>
