<div class="pokemon-search">
  <div class="pokemon-search__header">
    <div class="pokemon-search__field">
      <label for="format">Format</label>
      <select [(ngModel)]="selectedFormat" id="format">
        @for (format of formats; track format) {
          <option value="{{ format }}">
            {{ format }}
          </option>
        }
      </select>
    </div>

    <div class="pokemon-search__field">
      <label for="ruleset">Ruleset</label>
      <select [(ngModel)]="selectedRuleset" id="ruleset">
        @for (ruleset of rulesets; track ruleset) {
          <option value="{{ ruleset }}">
            {{ ruleset }}
          </option>
        }
      </select>
    </div>
  </div>

  <div class="pokemon-search__search-panel">
    <div class="pokemon-search__mode-toggle">
      <button
        type="button"
        class="pokemon-search__mode-button"
        [class.is-active]="searchMode === 'quick'"
        (click)="setSearchMode('quick')"
      >
        Quick
      </button>
      <button
        type="button"
        class="pokemon-search__mode-button"
        [class.is-active]="searchMode === 'advanced'"
        (click)="setSearchMode('advanced')"
      >
        Advanced
      </button>
    </div>

    @if (searchMode === "quick") {
      <div class="pokemon-search__quick-search">
        <label for="quickName">Quick Search</label>
        <div class="pokemon-search__quick-input-row">
          <input
            id="quickName"
            type="text"
            [(ngModel)]="quickName"
            placeholder="e.g. Deoxys"
            (keydown.enter)="quickSearch()"
          />
          <button type="button" (click)="quickSearch()">Search Name</button>
        </div>
      </div>
    } @else if (searchMode === "advanced") {
      <!-- AND/OR mode radio group -->
      <div
        class="pokemon-search__mode-group"
        role="radiogroup"
        aria-label="Match mode"
      >
        <span class="pokemon-search__mode-group-label">Match:</span>
        <label class="pokemon-search__radio-label">
          <input type="radio" name="matchMode" [(ngModel)]="mode" value="and" />
          All
        </label>
        <label class="pokemon-search__radio-label">
          <input type="radio" name="matchMode" [(ngModel)]="mode" value="or" />
          Any
        </label>
      </div>

      <!-- Active filter pills -->
      <div class="pokemon-search__pill-bar" aria-label="Active filters">
        @for (filter of filters; track $index; let i = $index) {
          <button
            type="button"
            class="pokemon-search__pill"
            [class.is-editing]="drawerOpen && editingFilterIndex === i"
            [attr.aria-label]="getPillAriaLabel(filter, i)"
            (click)="openEditDrawer(i)"
          >
            <span class="pokemon-search__pill__label">{{
              getPillLabel(filter)
            }}</span>
            <span
              class="pokemon-search__pill__remove"
              role="button"
              tabindex="0"
              aria-label="Remove filter"
              (click)="$event.stopPropagation(); removeFilter(i)"
              (keydown.enter)="$event.stopPropagation(); removeFilter(i)"
              (keydown.space)="$event.stopPropagation(); removeFilter(i)"
              >✕</span
            >
          </button>
        }

        <button
          type="button"
          class="pokemon-search__add-filter"
          (click)="openAddDrawer()"
          aria-label="Add filter"
        >
          + Add Filter
        </button>
      </div>

      <!-- Inline filter drawer -->
      @if (drawerOpen && draftFilter) {
        <pdz-filter-drawer
          [fields]="fields"
          [moveFields]="moveFields"
          [operatorLabels]="operatorLabels"
          [initialFilter]="draftFilter"
          [isEditing]="editingFilterIndex !== null"
          (apply)="applyDrawerFilter($event)"
          (cancel)="closeDrawer()"
        ></pdz-filter-drawer>
      }

      <!-- Search / Reset actions -->
      <div class="pokemon-search__actions">
        <button
          type="button"
          class="pokemon-search__subtle"
          (click)="resetFilters()"
        >
          Reset
        </button>
        <button type="button" (click)="runAdvancedSearch()">Search</button>
      </div>
    }
  </div>

  <pdz-pokemon-search-core
    [rulesetId]="selectedRuleset"
    [formatId]="selectedFormat"
    [allResults]="allResults"
    [isLoading]="isLoading"
    [errorMessage]="errorMessage"
  ></pdz-pokemon-search-core>
</div>
